name: Fetch News and Trigger Vercel Deploy

on:
  schedule:
    - cron: '7,37 1-4 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写入权限来提交 data.json
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 获取完整历史，避免提交冲突

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch News Data
        env:
          ALAPI_TOKEN: ${{ secrets.ALAPI_TOKEN }}
        run: node scripts/fetch-news.js

      - name: Commit and Push data.json
        id: commit_step # 给这一步加个 ID，方便后面判断是否有更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update daily news data [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Remote Repository Dispatch
        # 只有在数据真正更新（有 commit）时才触发
        if: steps.commit_step.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v2
        with:
          # 你需要在 Settings > Secrets 中添加一个名为 REPO_DISPATCH_PAT 的 Secret
          # 该 Token 至少需要目标私有仓库的 `contents: write` 权限
          token: ${{ secrets.REPO_DISPATCH_PAT }}
          repository: HDILP/fkst-auto # 替换为你的私有仓库全名
          event-type: zaobao # 自定义事件名
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'